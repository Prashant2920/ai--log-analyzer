apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/prometheus-rules.yml

    scrape_configs:
      - job_name: "fastapi"
        metrics_path: /metrics
        static_configs:
          - targets: ["backend-service:8000"]