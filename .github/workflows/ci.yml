name: AI Log Analyzer CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Docker login
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 Build Backend
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-log-analyzer-backend:latest ./backend

      # 🔹 Push Backend
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-log-analyzer-backend:latest

      # 🔹 Build Generator
      - name: Build Generator Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-log-generator:latest ./log-generator

      # 🔹 Push Generator
      - name: Push Generator Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-log-generator:latest

      # 🔹 Setup kubeconfig
      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      # 🔹 Deploy to Kubernetes
      - name: Deploy to K8s
        run: kubectl apply -f k8s/