name: AI Log Analyzer CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t ai-log-backend ./backend

      - name: Build Generator Image
        run: docker build -t ai-log-generator ./log-generator

      - name: Verify Docker Images
        run: docker images
